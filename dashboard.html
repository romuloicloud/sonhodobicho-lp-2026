<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando | Sonho do Bicho</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #111827; color: #F3F4F6; font-family: 'Inter', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1F2937; padding: 25px; border-radius: 12px; border-left: 5px solid #E4007C; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .card h3 { margin: 0 0 10px; font-size: 14px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 40px; font-weight: 800; color: #fff; }
        table { width: 100%; border-collapse: collapse; background: #1F2937; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #374151; }
        th { background: #374151; font-weight: 600; color: #9CA3AF; }
        tr:hover { background: #4B5563; }
        .tag-uf { background: #6A0DAD; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        h2 { border-bottom: 2px solid #374151; padding-bottom: 10px; margin-top: 40px; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111827; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; }
        input { padding: 12px; font-size: 16px; border-radius: 8px; border: none; margin-bottom: 15px; width: 250px; text-align: center; }
        button { background: #6A0DAD; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Barreira de Proteção Leve -->
    <div class="lock-screen" id="lock-screen">
        <h2 style="border:none;">Acesso Restrito - Comando</h2>
        <input type="password" id="senha" placeholder="Senha da Missão" onkeypress="if(event.key === 'Enter') checkLock()">
        <button onclick="checkLock()">Liberar Painel</button>
    </div>

    <h1>🛰️ Monitor de Lançamento</h1>

    <div class="grid">
        <div class="card">
            <h3>Total de Protetores no Mapa</h3>
            <div class="value" id="kpi-leads">...</div>
        </div>
        <div class="card" style="border-left-color: #6A0DAD;">
            <h3>Total de Pets Registrados</h3>
            <div class="value" id="kpi-pets">...</div>
        </div>
    </div>

    <h2>Últimos Cadastros Livres</h2>
    <table>
        <thead>
            <tr>
                <th>Nome / ONG</th>
                <th>Estado</th>
                <th>Instagram</th>
                <th>WhatsApp</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody id="tabela-leads">
            <tr><td colspan="5" style="text-align:center;">Carregando inteligência da nuvem...</td></tr>
        </tbody>
    </table>

    <script>
        const SUPABASE_URL = "https://orzrtshvgmtmzfkezaae.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yenJ0c2h2Z210bXpma2V6YWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzQ3MDgsImV4cCI6MjA4OTYxMDcwOH0.TOUjyM0VLno_0KXsL_c6YBwdnczzsnn5ltTd2-OZhHA";
        const supabaseUrl = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkLock() {
            if(document.getElementById('senha').value === 'sonar2026') {
                document.getElementById('lock-screen').style.display = 'none';
                iniciarPainel();
            } else {
                alert('Acesso Negado.');
            }
        }

        async function iniciarPainel() {
            // Contagens Exatas
            const { count: countLeads } = await supabaseUrl.from('leads_pets').select('*', { count: 'exact', head: true });
            const { count: countPets } = await supabaseUrl.from('pets_comunidade').select('*', { count: 'exact', head: true });
            
            document.getElementById('kpi-leads').innerText = countLeads || 0;
            document.getElementById('kpi-pets').innerText = countPets || 0;

            // Listar Últimos Leads (Order By Data desc)
            const { data } = await supabaseUrl.from('leads_pets').select('*').order('created_at', { ascending: false }).limit(50);
            
            const tbody = document.getElementById('tabela-leads');
            tbody.innerHTML = '';

            if(data && data.length > 0) {
                data.forEach(lead => {
                    const dataFormatada = new Date(lead.created_at).toLocaleString('pt-BR');
                    const linkInsta = lead.instagram_handle.replace('@', '');
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${lead.nome_protetor}</strong></td>
                            <td><span class="tag-uf">${lead.estado_uf}</span></td>
                            <td><a href="https://instagram.com/${linkInsta}" target="_blank" style="color:#60A5FA;">${lead.instagram_handle}</a></td>
                            <td>${lead.whatsapp}</td>
                            <td>${dataFormatada}</td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhum protetor registrado ainda.</td></tr>';
            }
        }
    </script>
</body>
</html>
